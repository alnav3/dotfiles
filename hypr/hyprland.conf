# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
source = ~/.config/hypr/monitors.conf
#monitor=eDP-1,2880x1920@120.00,-32x0,2.00
#monitor=DP-10,1920x1080@120.00,1408x-128,1.00


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty -e tmux new-session -A -s develop
$btop = kitty -e btop
$opencode = EDITOR=nvim; kitty -e sh -c 'CACHE=~/.cache/dev-dirs; [ ! -f "$CACHE" ] && find ~ -name ".git" -type d | sed "s|/.git||" | sort -r > "$CACHE"; cd "$(cat "$CACHE" | fzf --tac)" && exec opencode'
$fileManager = nautilus
#$menu = rofi -show drun -run-command '/home/alnav/.config/hypr/scripts/open_app.sh {cmd}'
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = sudo ectool pwmsetkblight 0
exec-once = easyeffects --gapplication-service
exec-once = noctalia-shell & hyprpaper & hypridle &
exec-once = hyprdynamicmonitors run



#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,24


