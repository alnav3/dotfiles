# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

scrolling {
    fullscreen_on_one_column = true
    column_width = 1.0
    direction = right
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    vfr = true
    focus_on_activate = true
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
    }

}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace
gesture = 3, pinch, resize


# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, period, layoutmsg, move +col
bind = $mainMod, comma, layoutmsg, move -col
bind = $mainMod SHIFT, period, layoutmsg, swapcol r
bind = $mainMod SHIFT, comma, layoutmsg, swapcol l

bind = $mainMod, Tab, changegroupactive
bind = $mainMod, G, exec, ~/.config/hypr/scripts/group_workspace.sh

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
#bind = $mainMod, Q, exec, $terminal
bind = $mainMod, Q, exec, ~/.config/hypr/scripts/smart_q.sh
bind = $mainMod SHIFT, Q, exec, ~/.config/hypr/scripts/smart_shift_q.sh
bind = $mainMod, W, exec, hyprshot -m active -m output -o /home/alnav/Pictures/Screenshots
bind = $mainMod SHIFT, W, exec, hyprshot -m region -o /home/alnav/Pictures/Screenshots
#bind = $mainMod, C, killactive,
bind = $mainMod, C, exec, ~/.config/hypr/scripts/close_app.sh
bind = $mainMod ALT, C, exec, ~/.config/hypr/scripts/open_app.sh "claude.ai"
bind = $mainMod SHIFT, M, exec, hyprexit
bind = $mainMod, M, exec, ~/.config/hypr/scripts/open_app.sh "tv.home"
bind = $mainMod, E, exec, ~/.config/hypr/scripts/open_app.sh $fileManager
#bind = $mainMod, V, togglefloating,
bind = ALT, SPACE, exec, $menu
bind = RALT, SPACE, exec, $menu
#bind = $mainMod, P, pseudo, # dwindle
#bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, T, exec, ~/.config/hypr/scripts/open_app.sh btop
bind = $mainMod, V, exec, ~/.config/hypr/scripts/toggle-layout.sh
bind = $mainMod ALT, T, exec, ~/.config/hypr/scripts/open_app.sh teams-for-linux
bind = $mainMod, B, exec, ~/.config/hypr/scripts/open_app.sh zen-beta
# Move window with mainMod + motion keys
bind = $mainMod SHIFT, h, movewindoworgroup, l
bind = $mainMod SHIFT, l, movewindoworgroup, r
bind = $mainMod ALT, l, exec, hyprlock
bind = $mainMod SHIFT, k, movewindoworgroup, u
bind = $mainMod SHIFT, j, movewindoworgroup, d
bind = $mainMod, U, moveoutofgroup
bind = SUPER, F, fullscreen, 0
bind = SUPER CTRL, F, fullscreenstate, 0 2
bind = $mainMod, P, exec, hyprshot -m active -m output -o /home/alnav/Pictures/Screenshots
bind = $mainMod, N, exec, ~/.config/hypr/scripts/smart_n.sh
bind = $mainMod, O, exec, tmux run-shell '~/.tmux/plugins/tmux-sessionx/scripts/sessionx.sh'
bind = $mainMod, Y, exec, ~/.config/hypr/scripts/smart_y.sh
bind = $mainMod SHIFT, P, exec, hyprshot -m region -o /home/alnav/Pictures/Screenshots
bind = $mainMod, R, exec, notify-send -t 0 "Recording Started" "Recording screen..." && wf-recorder -f ~/Videos/recordings/recording-$(date +%Y%m%d-%H%M%S).mp4
bind = $mainMod SHIFT, R, exec, pkill wf-recorder && notify-send "Recording Stopped" "Recording saved to Videos/recordings/"
bind = $mainMod, A, exec, ~/.config/hypr/scripts/open_app.sh opencode

# brightness control keys
binde = SHIFT, F1, exec, /home/alnav/brightness_control.sh down
binde = SHIFT, F2, exec, /home/alnav/brightness_control.sh up

# volume keys
binde = , F11, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-
binde = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%-
binde = , F12, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.5 @DEFAULT_AUDIO_SINK@ 5%+

# Headphone map buttons
# Previous track
bindl=, XF86AudioPlay, exec, playerctl play-pause
bindl=, XF86AudioPause, exec, playerctl play-pause
bindl=, XF86AudioNext, exec, playerctl next
bindl=, XF86AudioPrev, exec, playerctl previous


# trigger when the switch is turning on
bindl = , F3, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , F4, exec, hyprctl keyword monitor "desc:BOE NE135A1M-NY1,2880x1920@120,auto,2, vrr, 1"
#bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/scripts/lid_switch_off.sh
# trigger when the switch is turning off
#bindl = , switch:off:Lid Switch, exec, hyprctl reload
#bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 2880x1920@120.00000, 0x0, 2"

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
