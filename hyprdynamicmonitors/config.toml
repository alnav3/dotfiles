[general]
destination = "$HOME/.config/hypr/monitors.conf"
debounce_time_ms = 1500
post_apply_exec = "gio launch $HOME/.local/share/applications/HyprPanel.desktop"

[power_events]

[power_events.dbus_query_object]
path = "/org/freedesktop/UPower/devices/line_power_ACAD"

[[power_events.dbus_signal_match_rules]]
object_path = "/org/freedesktop/UPower/devices/line_power_ACAD"


[profiles.office]
config_file = "/home/alnav/.config/hyprdynamicmonitors/hyprconfigs/office.go.tmpl"
config_file_type = "template"
[profiles.office.conditions]

[[profiles.office.conditions.required_monitors]]
description = "BOE NE135A1M-NY1"
monitor_tag = "monitor0"

[[profiles.office.conditions.required_monitors]]
description = "Microstep MSI G272 0x0000115A"
monitor_tag = "monitor1"


[profiles.laptop]
config_file = "/home/alnav/.config/hyprdynamicmonitors/hyprconfigs/laptop.go.tmpl"
config_file_type = "template"
[profiles.laptop.conditions]

[[profiles.laptop.conditions.required_monitors]]
description = "BOE NE135A1M-NY1"
monitor_tag = "monitor0"
